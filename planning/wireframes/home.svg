<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="650" fill="#ffffff" stroke="#333333" stroke-width="2"/>

  <!-- Nav bar -->
  <rect x="0" y="0" width="900" height="60" fill="#e0e0e0" stroke="#333333" stroke-width="1.5"/>
  <text x="20" y="37" font-size="20" font-weight="bold" fill="#222">EatRite</text>
  <text x="380" y="35" font-size="14" fill="#333" text-decoration="underline">Home</text>
  <text x="450" y="35" font-size="14" fill="#333">My Kitchen</text>
  <text x="560" y="35" font-size="14" fill="#333">Calendar</text>
  <text x="660" y="35" font-size="14" fill="#333">Profile</text>
  <rect x="780" y="15" width="90" height="30" rx="4" fill="#ffffff" stroke="#333"/>
  <text x="825" y="35" font-size="13" fill="#333" text-anchor="middle">Log Out</text>

  <!-- Page title -->
  <text x="20" y="95" font-size="22" font-weight="bold" fill="#222">Recipe Results</text>

  <!-- Sort / filter bar -->
  <rect x="20" y="110" width="180" height="34" rx="4" fill="#f5f5f5" stroke="#333"/>
  <text x="30" y="132" font-size="13" fill="#333">Sort by: Rating ▾</text>

  <rect x="215" y="110" width="120" height="34" rx="4" fill="#f5f5f5" stroke="#333"/>
  <text x="225" y="132" font-size="13" fill="#333">Newest ▾</text>

  <rect x="350" y="110" width="130" height="34" rx="4" fill="#f5f5f5" stroke="#333"/>
  <text x="360" y="132" font-size="13" fill="#333">♥ Favorites</text>

  <rect x="650" y="110" width="230" height="34" rx="4" fill="#ffffff" stroke="#333"/>
  <text x="660" y="132" font-size="13" fill="#999">Search recipes...</text>

  <!-- Recipe card grid: 3 cols x 2 rows -->
  <!-- Row 1 -->
  <g>
    <rect x="20" y="165" width="270" height="200" rx="6" fill="#fafafa" stroke="#333"/>
    <rect x="35" y="180" width="240" height="120" fill="#dcdcdc" stroke="#999"/>
    <text x="45" y="320" font-size="14" font-weight="bold" fill="#222">Recipe Title</text>
    <text x="45" y="340" font-size="12" fill="#555">★★★★☆</text>
    <text x="255" y="340" font-size="14" fill="#555">♥</text>
  </g>
  <g>
    <rect x="315" y="165" width="270" height="200" rx="6" fill="#fafafa" stroke="#333"/>
    <rect x="330" y="180" width="240" height="120" fill="#dcdcdc" stroke="#999"/>
    <text x="340" y="320" font-size="14" font-weight="bold" fill="#222">Recipe Title</text>
    <text x="340" y="340" font-size="12" fill="#555">★★★☆☆</text>
    <text x="550" y="340" font-size="14" fill="#555">♥</text>
  </g>
  <g>
    <rect x="610" y="165" width="270" height="200" rx="6" fill="#fafafa" stroke="#333"/>
    <rect x="625" y="180" width="240" height="120" fill="#dcdcdc" stroke="#999"/>
    <text x="635" y="320" font-size="14" font-weight="bold" fill="#222">Recipe Title</text>
    <text x="635" y="340" font-size="12" fill="#555">★★★★★</text>
    <text x="845" y="340" font-size="14" fill="#555">♥</text>
  </g>

  <!-- Row 2 -->
  <g>
    <rect x="20" y="385" width="270" height="200" rx="6" fill="#fafafa" stroke="#333"/>
    <rect x="35" y="400" width="240" height="120" fill="#dcdcdc" stroke="#999"/>
    <text x="45" y="540" font-size="14" font-weight="bold" fill="#222">Recipe Title</text>
    <text x="45" y="560" font-size="12" fill="#555">★★☆☆☆</text>
    <text x="255" y="560" font-size="14" fill="#555">♥</text>
  </g>
  <g>
    <rect x="315" y="385" width="270" height="200" rx="6" fill="#fafafa" stroke="#333"/>
    <rect x="330" y="400" width="240" height="120" fill="#dcdcdc" stroke="#999"/>
    <text x="340" y="540" font-size="14" font-weight="bold" fill="#222">Recipe Title</text>
    <text x="340" y="560" font-size="12" fill="#555">★★★★☆</text>
    <text x="550" y="560" font-size="14" fill="#555">♥</text>
  </g>
  <g>
    <rect x="610" y="385" width="270" height="200" rx="6" fill="#fafafa" stroke="#333"/>
    <rect x="625" y="400" width="240" height="120" fill="#dcdcdc" stroke="#999"/>
    <text x="635" y="540" font-size="14" font-weight="bold" fill="#222">Recipe Title</text>
    <text x="635" y="560" font-size="12" fill="#555">★★★☆☆</text>
    <text x="845" y="560" font-size="14" fill="#555">♥</text>
  </g>
</svg>
