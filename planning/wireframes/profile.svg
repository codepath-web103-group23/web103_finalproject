<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="650" fill="#ffffff" stroke="#333333" stroke-width="2"/>

  <!-- Nav bar -->
  <rect x="0" y="0" width="900" height="60" fill="#e0e0e0" stroke="#333333" stroke-width="1.5"/>
  <text x="20" y="37" font-size="20" font-weight="bold" fill="#222">EatRite</text>
  <text x="380" y="35" font-size="14" fill="#333">Home</text>
  <text x="450" y="35" font-size="14" fill="#333">My Kitchen</text>
  <text x="560" y="35" font-size="14" fill="#333">Calendar</text>
  <text x="660" y="35" font-size="14" fill="#333" text-decoration="underline">Profile</text>
  <rect x="780" y="15" width="90" height="30" rx="4" fill="#ffffff" stroke="#333"/>
  <text x="825" y="35" font-size="13" fill="#333" text-anchor="middle">Log Out</text>

  <!-- Avatar + basic info -->
  <circle cx="90" cy="140" r="50" fill="#dcdcdc" stroke="#999"/>
  <text x="160" y="120" font-size="20" font-weight="bold" fill="#222">Jane Doe</text>
  <text x="160" y="145" font-size="13" fill="#555">jane.doe@email.com</text>
  <rect x="160" y="160" width="110" height="30" rx="4" fill="#ffffff" stroke="#333"/>
  <text x="215" y="180" font-size="12" fill="#333" text-anchor="middle">Edit Profile</text>

  <!-- Dietary preferences -->
  <rect x="20" y="220" width="860" height="120" rx="6" fill="#fafafa" stroke="#333"/>
  <text x="40" y="245" font-size="16" font-weight="bold" fill="#222">Dietary Preferences</text>
  <rect x="720" y="228" width="140" height="30" rx="4" fill="#ffffff" stroke="#333"/>
  <text x="790" y="248" font-size="12" fill="#333" text-anchor="middle">Edit Preferences</text>
  <rect x="40" y="265" width="120" height="26" rx="13" fill="#e0e0e0" stroke="#999"/>
  <text x="100" y="283" font-size="11" fill="#333" text-anchor="middle">Vegetarian</text>
  <rect x="170" y="265" width="120" height="26" rx="13" fill="#e0e0e0" stroke="#999"/>
  <text x="230" y="283" font-size="11" fill="#333" text-anchor="middle">Low Sugar</text>
  <rect x="300" y="265" width="120" height="26" rx="13" fill="#e0e0e0" stroke="#999"/>
  <text x="360" y="283" font-size="11" fill="#333" text-anchor="middle">Nut-Free</text>

  <!-- My Kitchen link -->
  <rect x="20" y="360" width="860" height="60" rx="6" fill="#fafafa" stroke="#333"/>
  <text x="40" y="396" font-size="16" font-weight="bold" fill="#222">My Kitchen</text>
  <text x="800" y="396" font-size="13" fill="#333" text-anchor="middle">View →</text>

  <!-- Favorites preview -->
  <text x="20" y="450" font-size="16" font-weight="bold" fill="#222">Favorite Recipes</text>
  <g>
    <rect x="20" y="465" width="270" height="150" rx="6" fill="#fafafa" stroke="#333"/>
    <rect x="35" y="480" width="240" height="90" fill="#dcdcdc" stroke="#999"/>
    <text x="45" y="595" font-size="13" font-weight="bold" fill="#222">Recipe Title</text>
  </g>
  <g>
    <rect x="315" y="465" width="270" height="150" rx="6" fill="#fafafa" stroke="#333"/>
    <rect x="330" y="480" width="240" height="90" fill="#dcdcdc" stroke="#999"/>
    <text x="340" y="595" font-size="13" font-weight="bold" fill="#222">Recipe Title</text>
  </g>
  <g>
    <rect x="610" y="465" width="270" height="150" rx="6" fill="#fafafa" stroke="#999"/>
    <rect x="625" y="480" width="240" height="90" fill="#dcdcdc" stroke="#999"/>
    <text x="635" y="595" font-size="13" font-weight="bold" fill="#222">Recipe Title</text>
  </g>
</svg>
